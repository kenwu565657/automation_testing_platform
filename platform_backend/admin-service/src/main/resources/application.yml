server:
  port: 8081

spring:
  application:
    name: admin-service

  datasource:
    url: jdbc:postgresql://localhost:5432/testplatform
    username: platform
    password: platform123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: localhost:9093
    producer:
      key-serializer: org.apache.kafka.common.serialization.StringSerializer
      value-serializer: com.platform.infra.kafka.JsonSerializer

management:
  endpoints:
    web:
      exposure:
        include: health,info

---
# Docker profile
spring:
  config:
    activate:
      on-profile: docker
  flyway:
    enabled: true