services:
  gateway-service:
    profiles: [services]
    build:
      context: ../..
      dockerfile: docker/Dockerfile.gateway-service
    container_name: ${COMPOSE_PROJECT_NAME}-gateway
    restart: unless-stopped
    ports:
      - "8080:8080"
    environment:
      SPRING_CLOUD_GATEWAY_ROUTES_0_ID: admin-service
      SPRING_CLOUD_GATEWAY_ROUTES_0_URI: http://admin-service:8081
      SPRING_CLOUD_GATEWAY_ROUTES_0_PREDICATES_0: Path=/api/admin/**
      SPRING_CLOUD_GATEWAY_ROUTES_0_FILTERS_0: StripPrefix=2

      SPRING_CLOUD_GATEWAY_ROUTES_1_ID: engine-service
      SPRING_CLOUD_GATEWAY_ROUTES_1_URI: http://engine-service:8082
      SPRING_CLOUD_GATEWAY_ROUTES_1_PREDICATES_0: Path=/api/engine/**
      SPRING_CLOUD_GATEWAY_ROUTES_1_FILTERS_0: StripPrefix=2

      SPRING_CLOUD_GATEWAY_ROUTES_2_ID: report-service
      SPRING_CLOUD_GATEWAY_ROUTES_2_URI: http://report-service:8083
      SPRING_CLOUD_GATEWAY_ROUTES_2_PREDICATES_0: Path=/api/reports/**
      SPRING_CLOUD_GATEWAY_ROUTES_2_FILTERS_0: StripPrefix=2

      SPRING_CLOUD_GATEWAY_ROUTES_3_ID: report-service-ws
      SPRING_CLOUD_GATEWAY_ROUTES_3_URI: ws://report-service:8083
      SPRING_CLOUD_GATEWAY_ROUTES_3_PREDICATES_0: Path=/ws/**

      SPRING_DATA_REDIS_HOST: redis
      SPRING_DATA_REDIS_PORT: 6379
    depends_on:
      admin-service:
        condition: service_healthy
      report-service:
        condition: service_healthy
    networks:
      - platform-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8080/actuator/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 5