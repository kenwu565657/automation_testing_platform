services:
  engine-service:
    profiles: [services]
    build:
      context: ../..
      dockerfile: docker/Dockerfile.engine-service
    container_name: ${COMPOSE_PROJECT_NAME}-engine
    restart: unless-stopped
    ports:
      - "8082:8082"
    environment:
      KAFKA_BOOTSTRAP_SERVERS: kafka:29092
      ADMIN_SERVICE_URL: http://admin-service:8081
      REDIS_HOST: redis
      REDIS_PORT: 6379
      DB_URL: jdbc:postgresql://postgres:5432/${POSTGRES_DB}
      DB_USER: ${POSTGRES_USER}
      DB_PASSWORD: ${POSTGRES_PASSWORD}
    depends_on:
      admin-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
    networks:
      - platform-network
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8082/health || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 30s