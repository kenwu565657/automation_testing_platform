# ═══════════════════════════════════════════════════════════
#  Master compose — includes all sub-files.
#
#  Usage:
#    docker compose up -d                        (infra only)
#    docker compose --profile services up -d     (infra + services)
#    docker compose --profile tools up -d        (infra + dev tools)
#    docker compose --profile services --profile tools up -d  (all)
# ═══════════════════════════════════════════════════════════

include:
  # ── Infrastructure (always starts) ──
  - path: infrastructure/postgres/postgres.yml
  - path: infrastructure/kafka.yml
  - path: infrastructure/elasticsearch.yml
  - path: infrastructure/redis.yml

  # ── Dev Tools (opt-in) ──
  - path: tools/kibana.yml
  - path: tools/kafka-ui.yml

  # ── Application Services (opt-in) ──
  - path: services/gateway.yml
  - path: services/admin.yml
  - path: services/engine.yml
  - path: services/report.yml

networks:
  platform-network:
    driver: bridge

volumes:
  postgres-data:
  kafka-data:
  es-data:
  redis-data: